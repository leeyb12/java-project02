spring.application.name=interview

spring.output.ansi.enabled=always

# Oracle 19c/21c 이상 버전 기준 (ojdbc11 사용)
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# localhost:1521:xe 부분은 실제 DB 주소와 SID에 맞게 수정하세요.
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=interview
spring.datasource.password=1234

# 이미지 구조에 있는 resources/mapper 폴더 내의 모든 xml 파일을 인식합니다.
mybatis.mapper-locations=classpath:mapper/**/*.xml
# DTO 클래스들을 패키지 경로 없이 이름만으로 사용할 수 있게 설정합니다.
mybatis.type-aliases-package=com.pknu26.interview.dto
# 카멜케이스 자동 매핑 (DB의 USER_ID 컬럼을 Java의 userId 필드와 매핑)
mybatis.configuration.map-underscore-to-camel-case=true

# 이력서 PDF 파일 업로드를 위한 크기 제한 해제
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-form-post-size=10MB

# 서비스 코드에서 @Value("${ollama.api.url}")로 불러와 사용할 수 있습니다.
ollama.api.url=http://localhost:11434
ollama.model.name=gemma4:e2b
# 복장 분석용 비전(멀티모달) 모델 — 별도로 pull 필요 (예: ollama pull llava)
ollama.vision.model.name=llava

# 녹화본 저장 디렉토리 (없으면 자동 생성)
app.upload.dir=./uploads

# 실행되는 SQL 쿼리를 콘솔에서 확인하고 싶을 때 사용합니다.
logging.level.com.pknu26.interview.repository=debug
server.address=0.0.0.0

# ===== 서버 포트 =====
# 프론트엔드(Vite) 프록시가 http://localhost:8080 으로 요청하므로 HTTP 8080 사용
server.port=8080

# ===== HTTPS 설정 (자체 서명 인증서) =====
# keystore.p12 파일이 없으면 부팅이 실패하므로 기본은 비활성화합니다.
# HTTPS가 필요하면 keystore.p12를 src/main/resources에 추가하고 아래 주석을 해제하세요.
