spring.application.name=interview

spring.output.ansi.enabled=always

# Oracle 19c/21c 이상 버전 기준 (ojdbc11 사용)
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver
# localhost:1521:xe 부분은 실제 DB 주소와 SID에 맞게 수정하세요.
spring.datasource.url=jdbc:oracle:thin:@localhost:1521:xe
spring.datasource.username=interview
spring.datasource.password=1234

# 이미지 구조에 있는 resources/mapper 폴더 내의 모든 xml 파일을 인식합니다.
mybatis.mapper-locations=classpath:mapper/**/*.xml
# DTO 클래스들을 패키지 경로 없이 이름만으로 사용할 수 있게 설정합니다.
mybatis.type-aliases-package=com.pknu26.interview.dto
# 카멜케이스 자동 매핑 (DB의 USER_ID 컬럼을 Java의 userId 필드와 매핑)
mybatis.configuration.map-underscore-to-camel-case=true

# 이력서 PDF 파일 업로드를 위한 크기 제한 해제
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
server.tomcat.max-swallow-size=10MB
server.tomcat.max-http-form-post-size=10MB

# 서비스 코드에서 @Value("${ollama.api.url}")로 불러와 사용할 수 있습니다.
ollama.api.url=http://localhost:11434
ollama.model.name=qwen3.5:4b

# 실행되는 SQL 쿼리를 콘솔에서 확인하고 싶을 때 사용합니다.
logging.level.com.pknu26.interview.repository=debug
server.address=0.0.0.0

# ===== HTTPS 설정 (자체 서명 인증서) =====
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:keystore.p12
server.ssl.key-store-password=changeit
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat
